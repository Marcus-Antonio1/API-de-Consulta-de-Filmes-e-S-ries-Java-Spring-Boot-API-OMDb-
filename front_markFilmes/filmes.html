<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/home.css">

    <title>Filmes - MarkFilmes</title>
</head>

<body>
    <header class="cabecalho">
        <div class="cabecalho__logo">
            <img src="./img/logo.png" alt="Logo MarkFilmes">
            <h1>MarkFilmes</h1>

            <!-- 🔥 FILTRO POR CATEGORIA -->
            <select data-categorias>
                <option value="todos">Categorias</option>
                <option value="comédia">Comédia</option>
                <option value="ação">Ação</option>
                <option value="crime">Crime</option>
                <option value="drama">Drama</option>
                <option value="aventura">Aventura</option>
            </select>
        </div>

        <!-- Ícones -->
        <div class="cabecalho__opcoes">
            <span class="material-symbols-outlined">search</span>
            <span class="material-symbols-outlined">notifications</span>
            <span class="material-symbols-outlined">account_circle</span>
        </div>

        <!-- 🔥 NAVEGAÇÃO -->
        <div class="cabecalho__opcoes">
            <a href="index.html">Home</a>
            <a href="filmes.html">Filmes</a>
        </div>
    </header>

    <main>

        <!-- 🔥 LANÇAMENTOS -->
        <section data-name="lancamentos" class="section">
            <h2>Lançamentos</h2>
        </section>

        <!-- 🔥 TOP 5 -->
        <section data-name="top5" class="section">
            <h2>Populares</h2>
        </section>

        <!-- 🔥 TODOS OS FILMES -->
        <section data-name="filmes" class="section">
            <h2>Todos os Filmes</h2>
        </section>

        <!-- 🔥 RESULTADO DE CATEGORIA -->
        <section data-name="categoria" class="hidden pesquisa">
            <h2>Filmes por Categoria</h2>
        </section>

    </main>

    <!-- JS -->
    <script src="./scripts/filmes.js" type="module"></script>
</body>

</html>
